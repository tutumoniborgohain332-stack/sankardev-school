openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Sankardev Vidya Niketan School API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: students
    description: Student management
  - name: staff
    description: Staff management
  - name: gallery
    description: Photo and video gallery
  - name: news
    description: News and announcements
  - name: admission
    description: Admission applications
  - name: stats
    description: Dashboard statistics
  - name: results
    description: Exam results

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login (staff or student)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current session user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Not authenticated

  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all students (admin/staff only)
      parameters:
        - name: class
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Create a student record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get a student by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Student record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudentUpdate"
      responses:
        "200":
          description: Updated student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Delete a student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff members
      responses:
        "200":
          description: List of staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffMember"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create a staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"

  /staff/{id}:
    get:
      operationId: getStaffMember
      tags: [staff]
      summary: Get a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
    patch:
      operationId: updateStaff
      tags: [staff]
      summary: Update a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUpdate"
      responses:
        "200":
          description: Updated staff member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffMember"
    delete:
      operationId: deleteStaff
      tags: [staff]
      summary: Delete a staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /gallery:
    get:
      operationId: listGallery
      tags: [gallery]
      summary: List gallery items
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [photo, video]
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Gallery items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryItem"
    post:
      operationId: createGalleryItem
      tags: [gallery]
      summary: Add a gallery item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryItem"

  /gallery/{id}:
    delete:
      operationId: deleteGalleryItem
      tags: [gallery]
      summary: Delete a gallery item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /news:
    get:
      operationId: listNews
      tags: [news]
      summary: List news and announcements
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: News articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsItem"
    post:
      operationId: createNews
      tags: [news]
      summary: Create news/announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"

  /news/{id}:
    patch:
      operationId: updateNews
      tags: [news]
      summary: Update a news item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"
    delete:
      operationId: deleteNews
      tags: [news]
      summary: Delete a news item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admissions:
    get:
      operationId: listAdmissions
      tags: [admission]
      summary: List admission applications
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: Admission applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdmissionApplication"
    post:
      operationId: submitAdmission
      tags: [admission]
      summary: Submit an admission application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdmissionInput"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdmissionApplication"

  /admissions/{id}:
    get:
      operationId: getAdmission
      tags: [admission]
      summary: Get an admission application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Admission application
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdmissionApplication"
    patch:
      operationId: updateAdmissionStatus
      tags: [admission]
      summary: Update admission status (approve/reject)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdmissionStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdmissionApplication"

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get admin dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/classes:
    get:
      operationId: getClassStats
      tags: [stats]
      summary: Get student count per class
      responses:
        "200":
          description: Class-wise student counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClassStat"

  /results:
    get:
      operationId: listResults
      tags: [results]
      summary: List or search exam results (public)
      parameters:
        - name: rollNumber
          in: query
          schema:
            type: string
        - name: className
          in: query
          schema:
            type: string
        - name: examType
          in: query
          schema:
            type: string
        - name: academicYear
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExamResult"
    post:
      operationId: createResult
      tags: [results]
      summary: Create an exam result (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamResultInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResult"

  /results/{id}:
    patch:
      operationId: updateResult
      tags: [results]
      summary: Update an exam result (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamResultInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResult"
    delete:
      operationId: deleteResult
      tags: [results]
      summary: Delete an exam result (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginInput:
      type: object
      required: [username, password, role]
      properties:
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, staff, student]

    AuthResponse:
      type: object
      required: [id, username, role, name]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
        name:
          type: string

    Student:
      type: object
      required: [id, studentName, fatherName, motherName, className, rollNumber, apaarId, admissionDate]
      properties:
        id:
          type: integer
        studentName:
          type: string
        fatherName:
          type: string
        motherName:
          type: string
        permanentAddress:
          type: ["string", "null"]
        presentAddress:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        caste:
          type: ["string", "null"]
        religion:
          type: ["string", "null"]
        className:
          type: string
        section:
          type: ["string", "null"]
        rollNumber:
          type: string
        apaarId:
          type: string
        bloodGroup:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        guardianName:
          type: ["string", "null"]
        guardianRelation:
          type: ["string", "null"]
        guardianPhone:
          type: ["string", "null"]
        previousSchool:
          type: ["string", "null"]
        admissionDate:
          type: string
        photoUrl:
          type: ["string", "null"]
        username:
          type: ["string", "null"]

    StudentInput:
      type: object
      required: [studentName, fatherName, motherName, className, rollNumber, apaarId, admissionDate]
      properties:
        studentName:
          type: string
        fatherName:
          type: string
        motherName:
          type: string
        permanentAddress:
          type: string
        presentAddress:
          type: string
        dateOfBirth:
          type: string
        caste:
          type: string
        religion:
          type: string
        className:
          type: string
        section:
          type: string
        rollNumber:
          type: string
        apaarId:
          type: string
        bloodGroup:
          type: string
        nationality:
          type: string
        guardianName:
          type: string
        guardianRelation:
          type: string
        guardianPhone:
          type: string
        previousSchool:
          type: string
        admissionDate:
          type: string
        photoUrl:
          type: string
        username:
          type: string
        password:
          type: string

    StudentUpdate:
      type: object
      properties:
        studentName:
          type: string
        fatherName:
          type: string
        motherName:
          type: string
        permanentAddress:
          type: string
        presentAddress:
          type: string
        dateOfBirth:
          type: string
        caste:
          type: string
        religion:
          type: string
        className:
          type: string
        section:
          type: string
        rollNumber:
          type: string
        apaarId:
          type: string
        bloodGroup:
          type: string
        guardianPhone:
          type: string
        photoUrl:
          type: string

    StaffMember:
      type: object
      required: [id, name, designation, department, joinDate]
      properties:
        id:
          type: integer
        name:
          type: string
        designation:
          type: string
        department:
          type: string
        qualification:
          type: ["string", "null"]
        subject:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        joinDate:
          type: string
        photoUrl:
          type: ["string", "null"]
        username:
          type: ["string", "null"]
        isHeadmaster:
          type: boolean

    StaffInput:
      type: object
      required: [name, designation, department, joinDate]
      properties:
        name:
          type: string
        designation:
          type: string
        department:
          type: string
        qualification:
          type: string
        subject:
          type: string
        phone:
          type: string
        email:
          type: string
        joinDate:
          type: string
        photoUrl:
          type: string
        username:
          type: string
        password:
          type: string
        isHeadmaster:
          type: boolean

    StaffUpdate:
      type: object
      properties:
        name:
          type: string
        designation:
          type: string
        department:
          type: string
        qualification:
          type: string
        subject:
          type: string
        phone:
          type: string
        email:
          type: string
        photoUrl:
          type: string

    GalleryItem:
      type: object
      required: [id, title, type, url, uploadedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [photo, video]
        url:
          type: string
        thumbnailUrl:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        uploadedAt:
          type: string

    GalleryInput:
      type: object
      required: [title, type, url]
      properties:
        title:
          type: string
        type:
          type: string
          enum: [photo, video]
        url:
          type: string
        thumbnailUrl:
          type: string
        category:
          type: string
        description:
          type: string

    NewsItem:
      type: object
      required: [id, title, content, publishedAt, isImportant]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        category:
          type: ["string", "null"]
        isImportant:
          type: boolean
        publishedAt:
          type: string

    NewsInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string
        category:
          type: string
        isImportant:
          type: boolean

    NewsUpdate:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        category:
          type: string
        isImportant:
          type: boolean

    AdmissionApplication:
      type: object
      required: [id, serialNumber, studentName, fatherName, motherName, appliedForClass, status, submittedAt]
      properties:
        id:
          type: integer
        serialNumber:
          type: ["string", "null"]
        classRollNumber:
          type: ["string", "null"]
        studentName:
          type: string
        fatherName:
          type: string
        motherName:
          type: string
        permanentAddress:
          type: ["string", "null"]
        presentAddress:
          type: ["string", "null"]
        pinCode:
          type: ["string", "null"]
        guardianName:
          type: ["string", "null"]
        guardianRelation:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        age:
          type: ["string", "null"]
        caste:
          type: ["string", "null"]
        religion:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        bloodGroup:
          type: ["string", "null"]
        previousSchoolName:
          type: ["string", "null"]
        previousSchoolAddress:
          type: ["string", "null"]
        previousClass:
          type: ["string", "null"]
        previousClassResult:
          type: ["string", "null"]
        reasonForLeaving:
          type: ["string", "null"]
        appliedForClass:
          type: string
        apaarId:
          type: ["string", "null"]
        siblingName:
          type: ["string", "null"]
        siblingClass:
          type: ["string", "null"]
        siblingSection:
          type: ["string", "null"]
        specialCategory:
          type: ["string", "null"]
        fatherPhone:
          type: ["string", "null"]
        motherPhone:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected]
        submittedAt:
          type: string
        remarks:
          type: ["string", "null"]

    AdmissionInput:
      type: object
      required: [studentName, fatherName, motherName, appliedForClass]
      properties:
        serialNumber:
          type: string
        classRollNumber:
          type: string
        studentName:
          type: string
        fatherName:
          type: string
        motherName:
          type: string
        permanentAddress:
          type: string
        presentAddress:
          type: string
        pinCode:
          type: string
        guardianName:
          type: string
        guardianRelation:
          type: string
        dateOfBirth:
          type: string
        age:
          type: string
        caste:
          type: string
        religion:
          type: string
        nationality:
          type: string
        bloodGroup:
          type: string
        previousSchoolName:
          type: string
        previousSchoolAddress:
          type: string
        previousClass:
          type: string
        previousClassResult:
          type: string
        reasonForLeaving:
          type: string
        appliedForClass:
          type: string
        apaarId:
          type: string
        siblingName:
          type: string
        siblingClass:
          type: string
        siblingSection:
          type: string
        specialCategory:
          type: string
        fatherPhone:
          type: string
        motherPhone:
          type: string

    AdmissionStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, approved, rejected]
        remarks:
          type: string

    DashboardStats:
      type: object
      required: [totalStudents, totalStaff, pendingAdmissions, totalGalleryItems, recentNewsCount]
      properties:
        totalStudents:
          type: integer
        totalStaff:
          type: integer
        pendingAdmissions:
          type: integer
        totalGalleryItems:
          type: integer
        recentNewsCount:
          type: integer
        maleStudents:
          type: integer
        femaleStudents:
          type: integer
        approvedAdmissions:
          type: integer
        rejectedAdmissions:
          type: integer

    ClassStat:
      type: object
      required: [className, count]
      properties:
        className:
          type: string
        count:
          type: integer

    SubjectResult:
      type: object
      required: [subject, maxMarks, marksObtained, grade]
      properties:
        subject:
          type: string
        maxMarks:
          type: integer
        marksObtained:
          type: integer
        grade:
          type: string

    ExamResult:
      type: object
      required: [id, rollNumber, studentName, className, examType, academicYear, subjects, totalMarks, marksObtained, percentage, result, publishedAt]
      properties:
        id:
          type: integer
        rollNumber:
          type: string
        studentName:
          type: string
        className:
          type: string
        section:
          type: ["string", "null"]
        examType:
          type: string
          enum: [Mid-term, Final, Unit-Test]
        academicYear:
          type: string
        subjects:
          type: array
          items:
            $ref: "#/components/schemas/SubjectResult"
        totalMarks:
          type: integer
        marksObtained:
          type: integer
        percentage:
          type: string
        result:
          type: string
          enum: [Pass, Fail]
        rank:
          type: ["integer", "null"]
        remarks:
          type: ["string", "null"]
        publishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    ExamResultInput:
      type: object
      required: [rollNumber, studentName, className, examType, academicYear, subjects, totalMarks, marksObtained, percentage, result]
      properties:
        rollNumber:
          type: string
        studentName:
          type: string
        className:
          type: string
        section:
          type: string
        examType:
          type: string
          enum: [Mid-term, Final, Unit-Test]
        academicYear:
          type: string
        subjects:
          type: array
          items:
            $ref: "#/components/schemas/SubjectResult"
        totalMarks:
          type: integer
        marksObtained:
          type: integer
        percentage:
          type: string
        result:
          type: string
          enum: [Pass, Fail]
        rank:
          type: integer
        remarks:
          type: string
