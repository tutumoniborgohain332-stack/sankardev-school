kind = "web"
previewPath = "/"
title = "Sankardev Vidya Niketan"
version = "1.0.0"
id = "artifacts/school-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21294

[services.development]
run = "pnpm --filter @workspace/school-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/school-website", "run", "build" ]
publicDir = "artifacts/school-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21294"
BASE_PATH = "/"
